name: Bug report
description: Report an API or documentation bug.
title: 'bug: '
labels:
    - bug
body:
    - type: textarea
      id: summary
      attributes:
          label: Summary
          description: What went wrong?
      validations:
          required: true
    - type: input
      id: endpoint
      attributes:
          label: Endpoint
          placeholder: GET /prayer/times?latitude=21.4225&longitude=39.8262
    - type: textarea
      id: reproduce
      attributes:
          label: Reproduction
          description: Steps, response status, and response body.
      validations:
          required: true
    - type: textarea
      id: expected
      attributes:
          label: Expected behavior
      validations:
          required: true
